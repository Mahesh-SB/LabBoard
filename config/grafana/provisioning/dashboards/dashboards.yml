apiVersion: 1

providers:
  - name: Redis API
    orgId: 1
    folder: "Redis API"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/redis-api

  - name: k6 Load Tests
    orgId: 1
    folder: "k6 Load Tests"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/k6-load-tests

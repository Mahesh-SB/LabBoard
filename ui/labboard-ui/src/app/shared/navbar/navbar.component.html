<nav class="navbar">

    <div class="nav-divider"></div>

    <div class="nav-menus">

      <!-- Home -->
      <a class="nav-link" routerLink="/" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }">

      <div class="nav-group">
        <button class="nav-group-btn">

            <span class="item-text">
              <span class="item-title">Client App</span>
              <span class="item-desc">Register OAuth clients</span>
            </span>
          </a>
          <a routerLink="/registered-apps" routerLinkActive="active">
            <span class="item-icon">📋</span>
            <span class="item-text">
              <span class="item-title">Registered Apps</span>
              <span class="item-desc">View &amp; manage privileges</span>
            </span>
          </a>
        </div>
      </div>

      <!-- Apps -->
      <div class="nav-group">
        <button class="nav-group-btn">
          <span class="menu-icon">⚡</span>

          <a routerLink="/tickets/book" routerLinkActive="active">
            <span class="item-icon">🎫</span>
            <span class="item-text">
              <span class="item-title">Ticket Master</span>
              <span class="item-desc">Book &amp; manage tickets</span>
            </span>

          </a>

  <div class="navbar-right">
    @if (isHome) {
      <button class="btn-signin" (click)="signIn()">🔑 Sign In</button>
    } @else {
      <button class="btn-signout" (click)="signOut()">⎋ Sign Out</button>
